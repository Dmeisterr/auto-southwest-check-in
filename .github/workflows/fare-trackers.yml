name: Standalone Fare Trackers

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  check-fares:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config
        env:
          CONFIG_JSON: ${{ secrets.AUTO_SOUTHWEST_CHECK_IN_CONFIG_JSON }}
        run: |
          if [ -z "$CONFIG_JSON" ]; then
            echo "Missing AUTO_SOUTHWEST_CHECK_IN_CONFIG_JSON secret" >&2
            exit 1
          fi
          printf '%s' "$CONFIG_JSON" > config.json

      - name: Restore fare tracker state
        uses: actions/cache/restore@v4
        with:
          path: logs/fare-tracker-state.json
          key: fare-tracker-state-${{ github.run_id }}
          restore-keys: |
            fare-tracker-state-

      - name: Check standalone fares
        run: python southwest.py --fare-trackers-once --fare-trackers-summary-file fare-drops.md --verbose

      - name: Add fare drops to job summary
        if: hashFiles('fare-drops.md') != ''
        run: cat fare-drops.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create fare drop issue
        if: hashFiles('fare-drops.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Southwest fare drop detected $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --body-file fare-drops.md

      - name: Save fare tracker state
        if: always() && hashFiles('logs/fare-tracker-state.json') != ''
        uses: actions/cache/save@v4
        with:
          path: logs/fare-tracker-state.json
          key: fare-tracker-state-${{ github.run_id }}
